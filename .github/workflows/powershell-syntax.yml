name: PowerShell Syntax

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  syntax-check:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $errors = @()
          $files = Get-ChildItem -Path . -Recurse -File -Filter *.ps1

          foreach ($file in $files) {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref]$tokens,
              [ref]$parseErrors
            ) | Out-Null

            if ($parseErrors) {
              $errors += [pscustomobject]@{
                File = $file.FullName
                Errors = ($parseErrors | ForEach-Object { $_.Message }) -join '; '
              }
            }
          }

          if ($errors.Count -gt 0) {
            $errors | Format-Table -Wrap | Out-String | Write-Host
            throw "PowerShell syntax check failed."
          }

          Write-Host "All PowerShell scripts parsed successfully."
